<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SpeedRun Timer</title>
  
  <link rel="icon" type="image/png" href="icono.png">
  
  <link rel="apple-touch-icon" href="icono.png">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">

  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlNwZWVkUnVuIFRpbWVyIiwKICAic2hvcnRfbmFtZSI6ICJTcGVlZFJ1biIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGEwYTBmIiwKICAidGhlbWVfY29sb3IiOiAiIzBhMGEwZiIKfQ==">
  
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --accent: #00ff9d;
    --accent2: #ff4060;
    --accent3: #ffd700;
    --text: #e0e0f0;
    --muted: #5a5a7a;
    --border: #2a2a3a;
    --ahead: #00ff9d;
    --behind: #ff4060;
    --gold: #ffd700;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ===== HOME ===== */
  #home-screen {
    background: var(--bg);
  }

  .home-header {
    padding: 48px 24px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d0d18 0%, var(--bg) 100%);
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .home-title {
    font-family: var(--font-ui);
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  .home-title span {
    color: var(--accent);
  }

  .runs-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .run-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .run-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .run-item:active { background: var(--bg3); }

  .run-item-info { flex: 1; }
  .run-item-name {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .run-item-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .run-item-pb {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--gold);
    text-align: right;
  }

  .run-item-arrow {
    color: var(--muted);
    font-size: 20px;
    margin-left: 16px;
  }

  .fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 32px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(0,255,157,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    z-index: 100;
  }
  .fab:active { transform: scale(0.93); box-shadow: 0 0 10px rgba(0,255,157,0.2); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }
  .empty-state-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state-text { font-size: 16px; line-height: 1.6; }

  /* ===== EDIT SCREEN ===== */
  #edit-screen {
    background: var(--bg);
  }

  .screen-header {
    display: flex;
    align-items: center;
    padding: 44px 16px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    background: var(--bg2);
  }

  .btn-back {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 28px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  .screen-title {
    font-size: 22px;
    font-weight: 700;
    flex: 1;
    letter-spacing: 0.5px;
  }

  .btn-save {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .btn-delete-run {
    background: none;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  .edit-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }

  .field-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 17px;
    font-weight: 500;
    outline: none;
    margin-bottom: 24px;
    transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--accent); }

  .splits-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .splits-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    font-family: var(--font-mono);
  }

  .btn-add-split {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
  }

  .split-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    transition: opacity 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .split-row.dragging {
    opacity: 0.4;
  }
  .split-row.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,255,157,0.25);
  }

  .split-row-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .drag-handle {
    color: var(--muted);
    font-size: 18px;
    cursor: grab;
    padding: 2px 4px;
    touch-action: none;
    flex-shrink: 0;
    line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }

  .split-name-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 500;
    outline: none;
  }
  .split-name-input:focus { border-color: var(--accent); }

  .btn-remove-split {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 22px;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }

  .split-times {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .split-time-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: var(--font-mono);
    margin-bottom: 5px;
  }

  .split-time-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    text-align: center;
  }
  .split-time-input:focus { border-color: var(--accent); }
  .split-time-input::placeholder { color: var(--muted); }

  .split-row-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .btn-reset-gold {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn-reset-gold:active { border-color: var(--accent2); color: var(--accent2); }

  .start-run-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    width: calc(100% - 32px);
    margin: 16px;
    padding: 16px;
    border-radius: 10px;
    font-family: var(--font-ui);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,255,157,0.25);
    transition: transform 0.1s;
  }
  .start-run-btn:active { transform: scale(0.97); }

  /* ===== RUN SCREEN ===== */
  #run-screen {
    background: var(--bg);
    position: relative;
  }

  #run-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .run-start-box {
    width: 88vw;
    max-width: 380px;
    aspect-ratio: 1;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .run-start-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    text-align: center;
    padding: 0 20px;
  }

  .play-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(0,255,157,0.5);
    transition: transform 0.1s;
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn svg { width: 36px; height: 36px; fill: var(--bg); margin-left: 5px; }

  .run-header {
    padding: 44px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .run-game-name {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }

  .run-timer {
    font-family: var(--font-mono);
    font-size: 52px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .run-timer.ahead { color: var(--ahead); }
  .run-timer.behind { color: var(--behind); }

  .run-pb-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .splits-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }

  .split-entry {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 7px;
    margin-bottom: 4px;
    border-left: 3px solid transparent;
    transition: background 0.2s;
    position: relative;
  }

  .split-entry.current {
    background: rgba(0,255,157,0.07);
    border-left-color: var(--accent);
  }
  .split-entry.done-ahead { border-left-color: var(--ahead); background: rgba(0,255,157,0.04); }
  .split-entry.done-behind { border-left-color: var(--behind); background: rgba(255,64,96,0.04); }
  .split-entry.done-gold { border-left-color: var(--gold); background: rgba(255,215,0,0.04); }

  .split-entry-name {
    flex: 1;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .split-entry.current .split-entry-name { color: var(--accent); }

  .split-entry-times {
    text-align: right;
    font-family: var(--font-mono);
  }

  .split-actual {
    font-size: 16px;
    color: var(--text);
  }
  .split-entry.done-ahead .split-actual { color: var(--ahead); }
  .split-entry.done-behind .split-actual { color: var(--behind); }
  .split-entry.done-gold .split-actual { color: var(--gold); }

  .split-pb-ref {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .split-delta {
    font-size: 13px;
    margin-top: 2px;
  }
  .split-delta.pos { color: var(--ahead); }
  .split-delta.neg { color: var(--behind); }

  /* Countdown warning */
  .split-countdown {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 5px;
    animation: pulse-warn 0.5s infinite alternate;
  }
  .split-countdown.warning { color: var(--accent3); background: rgba(255,215,0,0.1); }
  .split-countdown.overdue { color: var(--behind); background: rgba(255,64,96,0.1); }

  @keyframes pulse-warn {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }

  .run-footer {
    padding: 12px 16px 24px;
    display: flex;
    gap: 10px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
  }

  .btn-stop {
    flex: 1;
    background: none;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .btn-skip {
    flex: 1;
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 700;
    padding: 13px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Tap zones */
  .tap-zone {
    position: fixed;
    left: 0; right: 0;
    z-index: 150;
    cursor: pointer;
  }
  #tap-main { top: 80px; bottom: 80px; }
  
  .tap-flash {
    position: fixed;
    inset: 0;
    background: rgba(0,255,157,0.08);
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .tap-flash.show { opacity: 1; }

  /* ===== RESULTS SCREEN ===== */
  #results-screen {
    background: var(--bg);
  }

  .results-header {
    padding: 48px 20px 24px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .results-badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .results-badge.pb { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .results-badge.normal { background: rgba(0,255,157,0.1); color: var(--accent); border: 1px solid var(--accent); }

  .results-time {
    font-family: var(--font-mono);
    font-size: 56px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .results-delta {
    font-family: var(--font-mono);
    font-size: 18px;
    margin-top: 8px;
  }

  .results-splits {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .result-split-row {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg2);
    border-radius: 8px;
    margin-bottom: 8px;
    border-left: 3px solid var(--border);
  }
  .result-split-row.ahead { border-left-color: var(--ahead); }
  .result-split-row.behind { border-left-color: var(--behind); }
  .result-split-row.gold { border-left-color: var(--gold); }
  .result-split-row.skipped { opacity: 0.4; }

  .result-split-name { flex: 1; font-size: 16px; font-weight: 600; }
  .result-split-right { text-align: right; font-family: var(--font-mono); }
  .result-split-time { font-size: 16px; }
  .result-split-ref { font-size: 11px; color: var(--muted); }
  .result-split-delta { font-size: 12px; margin-top: 2px; }
  .result-split-delta.pos { color: var(--ahead); }
  .result-split-delta.neg { color: var(--behind); }
  .result-split-delta.gold-text { color: var(--gold); }

  .results-actions {
    padding: 12px 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
  }

  .btn-save-run-result {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: var(--font-ui);
    font-size: 17px;
    font-weight: 700;
    padding: 16px;
    border-radius: 9px;
    cursor: pointer;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    width: 100%;
    box-shadow: 0 0 16px rgba(0,255,157,0.3);
  }
  .btn-save-run-result.pb-mode {
    background: var(--gold);
    box-shadow: 0 0 20px rgba(255,215,0,0.35);
    color: #111;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 700;
    padding: 15px;
    border-radius: 9px;
    cursor: pointer;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    width: 100%;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 600;
    padding: 15px;
    border-radius: 9px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 100%;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 480px;
  }
  .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  .modal-text { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn { flex: 1; padding: 13px; border-radius: 8px; font-family: var(--font-ui); font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px; border: none; }
  .modal-btn.confirm { background: var(--accent2); color: #fff; }
  .modal-btn.cancel { background: var(--bg3); color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }

  /* ===== HISTORY ===== */
  .btn-delete-history-entry {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    padding: 4px 6px;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    margin-left: 6px;
  }
  .btn-delete-history-entry:active { color: var(--accent2); }

  .btn-clear-history {
    background: none;
    border: 1px solid var(--accent2);

<script>
// ===== SERVICE WORKER (offline) =====
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'speedrun-v1';
    const FONTS = [
      'https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap'
    ];
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(FONTS).catch(()=>{}))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      // For navigation (the HTML itself) — cache-first with network fallback
      if (e.request.mode === 'navigate') {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }))
        );
        return;
      }
      // For fonts/assets — cache first
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          if (res.ok) {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
          }
          return res;
        }).catch(() => new Response('', {status: 408})))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

async function vibrate(pattern) {
  if ('vibrate' in navigator) {
    try {
      // Si le pasas un número (ej: 80), lo convertimos en un patrón más fuerte
      // Un patrón de [200, 100, 200] vibra, para, y vuelve a vibrar fuerte.
      if (typeof pattern === 'number') {
        // Si el split es normal, vibramos 150ms (casi el doble de antes)
        navigator.vibrate(150); 
      } else {
        // Si es el patrón de Récord/Final (array), lo hacemos más largo
        navigator.vibrate(pattern);
      }
    } catch (e) {
      console.log("Vibración no disponible");
    }
  }
}

  // ===== DATA LAYER =====
  const DB_KEY = 'speedrun_data_v1';
let state = { runs: [] };

function saveState() {
  localStorage.setItem(DB_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { state = { runs: [] }; }
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ===== FORMAT TIME =====
function formatTime(ms, compact = false) {
  if (ms == null || ms < 0) return compact ? '--:--.--' : '--:--.-';
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const cs = Math.floor((ms % 1000) / 10);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function parseTimeInput(str) {
  if (!str || !str.trim()) return null;
  // Accepts: mm:ss.cc or m:ss.cc or ss.cc or h:mm:ss.cc
  const parts = str.trim().split(':');
  let h = 0, m = 0, s = 0, cs = 0;
  if (parts.length === 3) {
    h = parseInt(parts[0]) || 0;
    m = parseInt(parts[1]) || 0;
    const sp = parts[2].split('.');
    s = parseInt(sp[0]) || 0;
    cs = parseInt((sp[1] || '0').padEnd(2,'0').slice(0,2)) || 0;
  } else if (parts.length === 2) {
    m = parseInt(parts[0]) || 0;
    const sp = parts[1].split('.');
    s = parseInt(sp[0]) || 0;
    cs = parseInt((sp[1] || '0').padEnd(2,'0').slice(0,2)) || 0;
  } else {
    const sp = parts[0].split('.');
    s = parseInt(sp[0]) || 0;
    cs = parseInt((sp[1] || '0').padEnd(2,'0').slice(0,2)) || 0;
  }
  return ((h * 3600 + m * 60 + s) * 1000) + cs * 10;
}

// ===== SCREEN NAVIGATION =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== WAKE LOCK =====
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ===== HOME SCREEN =====
function renderHome() {
  const list = document.getElementById('runs-list');
  const empty = document.getElementById('empty-state');
  list.querySelectorAll('.run-item').forEach(el => el.remove());

  if (state.runs.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  state.runs.forEach(run => {
    const pbMs = run.pb;
    const pbStr = pbMs != null ? formatTime(pbMs) : 'Sin record';
    const splitsCount = run.splits.length;

    const el = document.createElement('div');
    el.className = 'run-item';
    el.innerHTML = `
      <div class="run-item-info">
        <div class="run-item-name">${escHtml(run.name)}</div>
        <div class="run-item-meta">${splitsCount} split${splitsCount !== 1 ? 's' : ''}</div>
      </div>
      <div>
        <div class="run-item-pb">${pbStr}</div>
      </div>
      <div class="run-item-arrow">›</div>
    `;
    el.addEventListener('click', () => openEditScreen(run.id));
    list.insertBefore(el, empty);
  });
}

document.getElementById('fab-add').addEventListener('click', () => openEditScreen(null));

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== EDIT SCREEN =====
let editingRunId = null;

function openEditScreen(runId) {
  editingRunId = runId;
  const isNew = runId == null;

  document.getElementById('edit-screen-title').textContent = isNew ? 'Nuevo Speedrun' : 'Editar Speedrun';
  document.getElementById('btn-delete-run').style.display = isNew ? 'none' : 'block';

  let run;
  if (isNew) {
    run = { id: null, name: '', splits: [], pb: null };
    document.getElementById('run-name-input').value = '';
  } else {
    run = state.runs.find(r => r.id === runId);
    document.getElementById('run-name-input').value = run.name;
  }

  renderSplitsEdit(run.splits);
  renderHistory(run);
  showScreen('edit-screen');
}

function renderHistory(run) {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  list.innerHTML = '';

  const history = run ? (run.history || []) : [];
  if (!run || run.id == null || history.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  // Top 10 sorted by time ascending
  const top10 = [...history].sort((a, b) => a.time - b.time).slice(0, 10);

  top10.forEach((entry, i) => {
    const isPb = i === 0; // fastest = #1
    const date = new Date(entry.date);
    const dateStr = date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: '2-digit' })
      + ' ' + date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

    const pos = i + 1;
    let posStyle = 'color:var(--muted)';
    if (pos === 1) posStyle = 'color:var(--gold)';
    else if (pos === 2) posStyle = 'color:#c0c0c0';
    else if (pos === 3) posStyle = 'color:#cd7f32';

    const row = document.createElement('div');
    row.className = `history-row${isPb ? ' pb' : ''}`;
    row.innerHTML = `
      <div style="font-family:var(--font-mono);font-size:18px;font-weight:700;width:32px;${posStyle}">#${pos}</div>
      <div class="history-row-left">
        <div class="history-row-time">${formatTime(entry.time)}</div>
        <div class="history-row-date">${dateStr}</div>
      </div>
      ${isPb ? '<span class="history-row-badge pb">🏆 récord</span>' : ''}
      <button class="btn-delete-history-entry" data-date="${entry.date}" title="Eliminar esta run">✕</button>
    `;
    list.appendChild(row);
  });

  // Delete individual history entry
  list.querySelectorAll('.btn-delete-history-entry').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const entryDate = parseInt(e.currentTarget.dataset.date);
      const run = state.runs.find(r => r.id === editingRunId);
      if (!run) return;
      const entry = run.history.find(h => h.date === entryDate);
      if (!entry) return;

      const isTop1 = run.history.sort((a,b) => a.time - b.time)[0]?.date === entryDate;
      const msg = isTop1
        ? `¿Eliminar el tiempo récord (${formatTime(entry.time)})? El #2 pasará a ser el nuevo récord y los golds se recalcularán.`
        : `¿Eliminar esta run (${formatTime(entry.time)})? Los golds se recalcularán con las runs restantes.`;

      showModal('Eliminar run del historial', msg, () => {
        run.history = run.history.filter(h => h.date !== entryDate);
        recalcGoldsAndPb(run);
        saveState();
        renderHistory(run);
        renderHome();
      });
    });
  });
}

// Recalculate golds and pbSplit for each split from remaining history entries
function recalcGoldsAndPb(run) {
  if (!run.history || run.history.length === 0) {
    run.pb = null;
    run.splits.forEach(s => { s.best = null; s.pbSplit = null; });
    return;
  }

  run.history.sort((a, b) => a.time - b.time);
  run.pb = run.history[0].time;

  // Update pbSplit from the fastest run (#1)
  const top1 = run.history[0];
  if (top1.splitDurations) {
    run.splits.forEach((split, i) => {
      split.pbSplit = top1.splitDurations[i] ?? null;
    });
  }

  // Recalculate golds: best individual split across ALL remaining history entries
  run.splits.forEach((split, i) => {
    split.best = null;
    run.history.forEach(entry => {
      if (!entry.splitDurations) return;
      const dur = entry.splitDurations[i];
      if (dur != null && (split.best == null || dur < split.best)) {
        split.best = dur;
      }
    });
  });
}

document.getElementById('btn-clear-history').addEventListener('click', () => {
  showModal('Borrar historial', '¿Seguro que quieres borrar todo el historial? Se resetearán también el récord y los golds.', () => {
    const run = state.runs.find(r => r.id === editingRunId);
    if (run) {
      run.history = [];
      recalcGoldsAndPb(run);
      saveState();
      renderHistory(run);
      renderHome();
    }
  });
});

function renderSplitsEdit(splits) {
  const list = document.getElementById('splits-edit-list');
  list.innerHTML = '';

  splits.forEach((split, i) => {
    const row = document.createElement('div');
    row.className = 'split-row';
    row.dataset.idx = i;
    row.draggable = true;

    const bestMs = split.best != null ? formatTime(split.best) : '';
    const pbSplitMs = split.pbSplit != null ? formatTime(split.pbSplit) : '';
    const hasGold = split.best != null;

    row.innerHTML = `
      <div class="split-row-top">
        <span class="drag-handle" title="Arrastrar para reordenar">⠿</span>
        <input class="split-name-input" type="text" placeholder="Nombre del split" value="${escHtml(split.name)}">
        <button class="btn-remove-split" data-idx="${i}">✕</button>
      </div>
      <div class="split-times">
        <div class="split-time-field">
          <label>Mejor split (gold)</label>
          <input class="split-time-input" type="text" placeholder="0:00.00" value="${bestMs}" data-field="best" data-idx="${i}">
        </div>
        <div class="split-time-field">
          <label>Split en run récord</label>
          <input class="split-time-input" type="text" placeholder="0:00.00" value="${pbSplitMs}" data-field="pbSplit" data-idx="${i}">
        </div>
      </div>
      <div class="split-row-footer">
        <button class="btn-reset-gold" data-idx="${i}" ${!hasGold ? 'style="opacity:0.3;pointer-events:none"' : ''}>↺ resetear gold</button>
      </div>
    `;
    list.appendChild(row);
  });

  // ---- DELETE with confirmation if has times ----
  list.querySelectorAll('.btn-remove-split').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.currentTarget.dataset.idx);
      const splits = getCurrentEditSplits();
      const s = splits[idx];
      const hasTimes = s.best != null || s.pbSplit != null;
      if (hasTimes) {
        showModal(
          'Eliminar split',
          `"${s.name || `Split ${idx+1}`}" tiene tiempos registrados. ¿Seguro que quieres eliminarlo? El PB total se recalculará.`,
          () => { splits.splice(idx, 1); renderSplitsEdit(splits); }
        );
      } else {
        splits.splice(idx, 1);
        renderSplitsEdit(splits);
      }
    });
  });

  // ---- RESET GOLD with confirmation ----
  list.querySelectorAll('.btn-reset-gold').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.currentTarget.dataset.idx);
      const splits = getCurrentEditSplits();
      const s = splits[idx];
      showModal(
        'Resetear gold',
        `¿Resetear el mejor split individual de "${s.name || `Split ${idx+1}`}"? Se borrará el tiempo gold pero el split de la run récord no cambia.`,
        () => {
          splits[idx].best = null;
          renderSplitsEdit(splits);
        }
      );
    });
  });

  // ---- DRAG & DROP (mouse + touch) ----
  let dragSrcIdx = null;
  let touchClone = null;
  let touchStartY = 0;

  list.querySelectorAll('.split-row').forEach((row, i) => {
    // Mouse drag
    row.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      list.querySelectorAll('.split-row').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      list.querySelectorAll('.split-row').forEach(r => r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const splits = getCurrentEditSplits();
      const moved = splits.splice(dragSrcIdx, 1)[0];
      splits.splice(i, 0, moved);
      renderSplitsEdit(splits);
    });

    // Touch drag — only from the handle
    const handle = row.querySelector('.drag-handle');
    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      dragSrcIdx = i;
      touchStartY = e.touches[0].clientY;

      // Create floating clone
      touchClone = row.cloneNode(true);
      touchClone.style.cssText = `
        position:fixed; left:${row.getBoundingClientRect().left}px;
        top:${row.getBoundingClientRect().top}px;
        width:${row.offsetWidth}px; opacity:0.85; z-index:999;
        pointer-events:none; border:2px solid var(--accent);
        border-radius:8px; background:var(--bg3);
      `;
      document.body.appendChild(touchClone);
      row.classList.add('dragging');
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (dragSrcIdx === null) return;
      e.preventDefault();
      const dy = e.touches[0].clientY - touchStartY;
      if (touchClone) {
        const origTop = list.querySelectorAll('.split-row')[dragSrcIdx]?.getBoundingClientRect().top ?? touchStartY;
        touchClone.style.top = (origTop + dy) + 'px';
      }
      // Highlight target row
      const touch = e.touches[0];
      list.querySelectorAll('.split-row').forEach(r => r.classList.remove('drag-over'));
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.split-row');
      if (target && target !== list.querySelectorAll('.split-row')[dragSrcIdx]) {
        target.classList.add('drag-over');
      }
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (dragSrcIdx === null) return;
      if (touchClone) { touchClone.remove(); touchClone = null; }
      list.querySelectorAll('.split-row').forEach(r => r.classList.remove('dragging', 'drag-over'));

      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.split-row');
      if (target) {
        const rows = [...list.querySelectorAll('.split-row')];
        const targetIdx = rows.indexOf(target);
        if (targetIdx !== -1 && targetIdx !== dragSrcIdx) {
          const splits = getCurrentEditSplits();
          const moved = splits.splice(dragSrcIdx, 1)[0];
          splits.splice(targetIdx, 0, moved);
          renderSplitsEdit(splits);
        }
      }
      dragSrcIdx = null;
    }, { passive: true });
  });
}

function getCurrentEditSplits() {
  const rows = document.querySelectorAll('#splits-edit-list .split-row');
  const splits = [];
  rows.forEach(row => {
    const name = row.querySelector('.split-name-input').value;
    const bestVal = row.querySelector('[data-field="best"]').value;
    const pbSplitVal = row.querySelector('[data-field="pbSplit"]').value;
    splits.push({
      name,
      best: parseTimeInput(bestVal),
      pbSplit: parseTimeInput(pbSplitVal),
    });
  });
  return splits;
}

document.getElementById('btn-add-split').addEventListener('click', () => {
  const splits = getCurrentEditSplits();
  splits.push({ name: '', best: null, pbSplit: null });
  renderSplitsEdit(splits);
  // scroll to bottom
  setTimeout(() => {
    const list = document.getElementById('splits-edit-list');
    list.lastElementChild?.scrollIntoView({ behavior: 'smooth' });
  }, 50);
});

document.getElementById('back-to-home').addEventListener('click', () => {
  showScreen('home-screen');
  renderHome();
});

document.getElementById('btn-save-run').addEventListener('click', () => {
  const name = document.getElementById('run-name-input').value.trim();
  if (!name) { alert('Escribe un nombre para el speedrun.'); return; }
  const splits = getCurrentEditSplits();

  if (editingRunId == null) {
    // New
    const run = { id: genId(), name, splits, pb: null, history: [] };
    // Compute pb from pbSplit times
    run.pb = computePbFromSplits(splits);
    state.runs.push(run);
  } else {
    const run = state.runs.find(r => r.id === editingRunId);
    run.name = name;
    run.splits = splits;
    run.pb = computePbFromSplits(splits);
  }
  saveState();
  showScreen('home-screen');
  renderHome();
});

function computePbFromSplits(splits) {
  // PB = cumulative time at the last split that has a pbSplit value.
  // This means the total run time is anchored to the last split,
  // and adding/removing intermediate splits doesn't change it.
  let cumulative = 0;
  let lastValid = null;
  for (const s of splits) {
    if (s.pbSplit != null) {
      cumulative += s.pbSplit;
      lastValid = cumulative;
    }
  }
  return lastValid; // null if no splits have times yet
}

document.getElementById('btn-delete-run').addEventListener('click', () => {
  showModal('Borrar speedrun', '¿Seguro que quieres borrar este speedrun y todos sus datos?', () => {
    state.runs = state.runs.filter(r => r.id !== editingRunId);
    saveState();
    showScreen('home-screen');
    renderHome();
  });
});

// ===== RUN LOGIC =====
let activeRun = null;
let runState = null;

document.getElementById('btn-start-run').addEventListener('click', () => {
  const runId = editingRunId;
  // Save first
  const name = document.getElementById('run-name-input').value.trim();
  if (!name) { alert('Guarda el speedrun primero.'); return; }
  // Save if new
  if (editingRunId == null) {
    document.getElementById('btn-save-run').click();
    return;
  }
  // Save current state
  document.getElementById('btn-save-run').click();

  const run = state.runs.find(r => r.id === runId);
  startRun(run);
});

function startRun(run) {
  activeRun = run;
  requestWakeLock();

  document.getElementById('run-game-name-label').textContent = run.name;
  document.getElementById('run-overlay-title').textContent = run.name;
  document.getElementById('run-overlay').style.display = 'flex';
  document.getElementById('run-pb-label').textContent = run.pb != null ? `PB: ${formatTime(run.pb)}` : 'Sin record';
  document.getElementById('run-timer').textContent = '0:00.00';
  document.getElementById('run-timer').className = 'run-timer';

  runState = {
    running: false,
    startTime: null,
    elapsed: 0,
    splitIdx: 0,
    splitTimes: [], // ms at which each split was hit (elapsed)
    rafId: null,
    tapState: { count: 0, lastTap: 0 },
  };

  renderRunSplits();
  showScreen('run-screen');
}

document.getElementById('play-btn').addEventListener('click', () => {
  document.getElementById('run-overlay').style.display = 'none';
  beginTimer();
});

function beginTimer() {
  runState.running = true;
  runState.startTime = performance.now();
  runState.elapsed = 0;
  tick();
}

function tick() {
  if (!runState || !runState.running) return;
  runState.elapsed = performance.now() - runState.startTime;
  updateTimerDisplay();
  updateSplitCountdowns();
  runState.rafId = requestAnimationFrame(tick);
}

function updateTimerDisplay() {
  const el = document.getElementById('run-timer');
  el.textContent = formatTime(runState.elapsed);

  // Color: compare to pb cumulative at current split
  const run = activeRun;
  const idx = runState.splitIdx;
  const pbCum = getCumulativePb(run, idx);
  if (pbCum != null) {
    if (runState.elapsed < pbCum) el.className = 'run-timer ahead';
    else el.className = 'run-timer behind';
  } else {
    el.className = 'run-timer';
  }
}

function getCumulativePb(run, splitIdx) {
  if (!run.splits[splitIdx]) return null;
  let total = 0;
  for (let i = 0; i <= splitIdx; i++) {
    if (run.splits[i].pbSplit == null) return null;
    total += run.splits[i].pbSplit;
  }
  return total;
}

function getGoldCumulative(run, splitIdx) {
  let total = 0;
  for (let i = 0; i <= splitIdx; i++) {
    const gold = run.splits[i].best;
    const pb = run.splits[i].pbSplit;
    const ref = gold != null ? Math.min(gold, pb ?? Infinity) : pb;
    if (ref == null) return null;
    total += ref;
  }
  return total;
}

function updateSplitCountdowns() {
  const run = activeRun;
  const idx = runState.splitIdx;
  if (idx >= run.splits.length) return;

  const pbCum = getCumulativePb(run, idx);
  const countdownEl = document.getElementById(`split-countdown-${idx}`);
  if (!countdownEl) return;

  if (pbCum == null) { countdownEl.style.display = 'none'; return; }

  const diff = pbCum - runState.elapsed; // positive = time remaining to pb
  if (diff > 30000) { countdownEl.style.display = 'none'; return; }

  countdownEl.style.display = 'block';
  if (diff > 0) {
    countdownEl.className = 'split-countdown warning';
    const secs = Math.ceil(diff / 1000);
    countdownEl.textContent = `-${secs}s`;
  } else {
    countdownEl.className = 'split-countdown overdue';
    const over = Math.floor((-diff) / 1000);
    countdownEl.textContent = `+${over}s`;
  }
}

function renderRunSplits() {
  const run = activeRun;
  const container = document.getElementById('run-splits-container');
  container.innerHTML = '';

  run.splits.forEach((split, i) => {
    const entry = document.createElement('div');
    entry.className = 'split-entry' + (i === 0 ? ' current' : '');
    entry.id = `split-entry-${i}`;

    const pbCum = getCumulativePb(run, i);
    const pbRef = pbCum != null ? formatTime(pbCum) : '--:--';

    entry.innerHTML = `
      <div class="split-entry-name">${escHtml(split.name) || `Split ${i+1}`}</div>
      <div class="split-entry-times">
        <div class="split-actual" id="split-actual-${i}">—</div>
        <div class="split-pb-ref" id="split-ref-${i}">${pbRef}</div>
        <div class="split-delta" id="split-delta-${i}"></div>
      </div>
      <div class="split-countdown" id="split-countdown-${i}" style="display:none"></div>
    `;
    container.appendChild(entry);
  });
}

function markSplit() {
  if (!runState || !runState.running) return;
  const run = activeRun;
  const idx = runState.splitIdx;
  if (idx >= run.splits.length) return;

  const splitTime = runState.elapsed;
  runState.splitTimes.push(splitTime);

  // Vibrate
  const pbCum = getCumulativePb(run, idx);
if (pbCum != null && splitTime < pbCum) {
  vibrate([150, 50, 150]); // Doble vibración fuerte si vas en verde
} else {
  vibrate(200); // Una vibración larga y seca si vas en rojo
}

  // Flash
  const flash = document.getElementById('tap-flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 150);

  // Update UI for this split
  updateSplitEntry(idx, splitTime);

  runState.splitIdx++;

  if (runState.splitIdx >= run.splits.length) {
    finishRun();
    return;
  }

  // Update current highlight
  document.querySelectorAll('.split-entry').forEach(el => el.classList.remove('current'));
  const nextEntry = document.getElementById(`split-entry-${runState.splitIdx}`);
  if (nextEntry) {
    nextEntry.classList.add('current');
    nextEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function updateSplitEntry(idx, splitTime) {
  const run = activeRun;
  const entry = document.getElementById(`split-entry-${idx}`);
  if (!entry) return;

  // Individual split duration
  const prevTime = idx > 0 ? runState.splitTimes[idx - 1] : 0;
  const splitDuration = splitTime - prevTime;

  const pbCum = getCumulativePb(run, idx);
  const gold = run.splits[idx].best;

  // Update actual time shown (cumulative)
  document.getElementById(`split-actual-${idx}`).textContent = formatTime(splitTime);

  // Delta
  const deltaEl = document.getElementById(`split-delta-${idx}`);
  if (pbCum != null) {
    const delta = splitTime - pbCum;
    deltaEl.textContent = (delta < 0 ? '-' : '+') + formatTime(Math.abs(delta));
    deltaEl.className = 'split-delta ' + (delta < 0 ? 'pos' : 'neg');
  }

  // Classification
  entry.classList.remove('current');
  const isGold = gold != null && splitDuration < gold;
  const isAhead = pbCum != null && splitTime < pbCum;

  if (isGold) entry.classList.add('done-gold');
  else if (isAhead) entry.classList.add('done-ahead');
  else entry.classList.add('done-behind');
}

function finishRun() {
  cancelAnimationFrame(runState.rafId);
  runState.running = false;
  const finalTime = runState.elapsed;
  vibrate([300, 100, 300, 100, 500]);

  const run = activeRun;
  const isPb = run.pb == null || finalTime < run.pb;

  // Store result temporarily — NOT saved yet, user must press Guardar
  runState.finalTime = finalTime;
  runState.isPb = isPb;

  showResultsScreen(finalTime, isPb);
  releaseWakeLock();
}

function commitSaveRun() {
  const run = activeRun;
  const finalTime = runState.finalTime;
  const isPb = runState.isPb;
  const newGolds = [];

  if (isPb) {
    run.pb = finalTime;
    run.splits.forEach((split, i) => {
      const cumTime = runState.splitTimes[i] ?? null;
      const prevCum = i > 0 ? (runState.splitTimes[i-1] ?? null) : 0;
      if (cumTime != null) {
        const splitDur = cumTime - prevCum;
        split.pbSplit = splitDur;
        if (split.best == null || splitDur < split.best) {
          split.best = splitDur;
          newGolds.push(i);
        }
      }
    });
  } else {
    // Always update golds even without PB
    run.splits.forEach((split, i) => {
      const cumTime = runState.splitTimes[i] ?? null;
      const prevCum = i > 0 ? (runState.splitTimes[i-1] ?? null) : 0;
      if (cumTime != null) {
        const splitDur = cumTime - prevCum;
        if (split.best == null || splitDur < split.best) {
          split.best = splitDur;
          newGolds.push(i);
        }
      }
    });
  }

  if (!run.history) run.history = [];

  // Store individual split durations so golds can be recalculated on deletion
  const splitDurations = run.splits.map((_, i) => {
    const cumTime = runState.splitTimes[i] ?? null;
    const prevCum = i > 0 ? (runState.splitTimes[i-1] ?? null) : 0;
    return (cumTime != null && prevCum != null) ? cumTime - prevCum : null;
  });

  run.history.push({ time: finalTime, date: Date.now(), newGolds, splitDurations });
  run.history.sort((a, b) => a.time - b.time);
  if (run.history.length > 10) run.history = run.history.slice(0, 10);
  saveState();
}

function showResultsScreen(finalTime, isPb) {
  const run = activeRun;

  const badge = document.getElementById('results-badge');
  badge.textContent = isPb ? '🏆 NUEVO RÉCORD' : 'RUN COMPLETADA';
  badge.className = 'results-badge ' + (isPb ? 'pb' : 'normal');

  document.getElementById('results-final-time').textContent = formatTime(finalTime);

  const deltaEl = document.getElementById('results-delta');
  if (run.pb != null && !isPb) {
    const delta = finalTime - run.pb;
    deltaEl.textContent = (delta >= 0 ? '+' : '') + formatTime(Math.abs(delta)) + (delta < 0 ? ' más rápido' : ' más lento');
    deltaEl.style.color = delta < 0 ? 'var(--ahead)' : 'var(--behind)';
  } else if (isPb && run.pb != null) {
    const delta = finalTime - run.pb;
    deltaEl.textContent = formatTime(Math.abs(delta)) + ' más rápido';
    deltaEl.style.color = 'var(--ahead)';
  } else {
    deltaEl.textContent = '';
  }

  // Render splits
  const list = document.getElementById('results-splits-list');
  list.innerHTML = '';
  run.splits.forEach((split, i) => {
    const cumTime = runState.splitTimes[i] ?? null;
    const prevCum = i > 0 ? (runState.splitTimes[i-1] ?? null) : 0;
    const splitDur = cumTime != null ? cumTime - prevCum : null;
    const pbCum = getCumulativePb(run, i);
    const skipped = cumTime == null;
    const isGold = !skipped && split.best != null && splitDur <= split.best;
    const isAhead = !skipped && pbCum != null && cumTime < pbCum;

    let cls = skipped ? 'skipped' : (isGold ? 'gold' : (isAhead ? 'ahead' : 'behind'));
    let deltaTxt = '';
    let deltaClass = '';
    if (!skipped && pbCum != null) {
      const d = cumTime - pbCum;
      deltaTxt = (d < 0 ? '-' : '+') + formatTime(Math.abs(d));
      deltaClass = d < 0 ? 'pos' : 'neg';
    }
    if (isGold) deltaClass = 'gold-text';

    const row = document.createElement('div');
    row.className = `result-split-row ${cls}`;
    row.innerHTML = `
      <div class="result-split-name">${escHtml(split.name) || `Split ${i+1}`}${isGold ? ' ★' : ''}</div>
      <div class="result-split-right">
        <div class="result-split-time">${skipped ? 'saltado' : formatTime(cumTime)}</div>
        <div class="result-split-ref">${pbCum != null ? formatTime(pbCum) : ''}</div>
        ${deltaTxt ? `<div class="result-split-delta ${deltaClass}">${deltaTxt}</div>` : ''}
      </div>
    `;
    list.appendChild(row);
  });

  showScreen('results-screen');

  // Compute preview golds
  const previewGolds = [];
  activeRun.splits.forEach((split, i) => {
    const cumTime = runState.splitTimes[i] ?? null;
    const prevCum = i > 0 ? (runState.splitTimes[i-1] ?? null) : 0;
    if (cumTime != null) {
      const dur = cumTime - prevCum;
      if (split.best == null || dur < split.best) previewGolds.push(i);
    }
  });

  // Check if run enters top 10
  const history = activeRun.history || [];
  const top10Full = history.length >= 10;
  const worstTop10 = top10Full ? history.sort((a,b) => a.time - b.time)[9].time : null;
  const entersTop10 = !top10Full || finalTime < worstTop10;

  const worthSaving = entersTop10 || previewGolds.length > 0;

  const saveBtn = document.getElementById('btn-save-result');
  if (!worthSaving) {
    saveBtn.style.display = 'none';
    document.getElementById('btn-results-home').textContent = '← VOLVER AL INICIO';
  } else {
    saveBtn.style.display = '';
    saveBtn.disabled = false;
    saveBtn.style.opacity = '';
    if (runState.isPb) {
      saveBtn.textContent = '🏆 GUARDAR NUEVO RÉCORD';
      saveBtn.className = 'btn-save-run-result pb-mode';
    } else if (previewGolds.length > 0 && entersTop10) {
      saveBtn.textContent = `★ GUARDAR (top 10 + ${previewGolds.length} gold${previewGolds.length > 1 ? 's' : ''})`;
      saveBtn.className = 'btn-save-run-result';
    } else if (previewGolds.length > 0) {
      saveBtn.textContent = `★ GUARDAR (${previewGolds.length} gold${previewGolds.length > 1 ? 's' : ''} nuevo${previewGolds.length > 1 ? 's' : ''})`;
      saveBtn.className = 'btn-save-run-result';
    } else {
      saveBtn.textContent = '💾 GUARDAR (entra en top 10)';
      saveBtn.className = 'btn-save-run-result';
    }
    document.getElementById('btn-results-home').textContent = '← VOLVER SIN GUARDAR';
  }
}

// ===== TAP DETECTION =====
const TAP_ZONE = document.getElementById('tap-main');
const DOUBLE_TAP_MS = 2000;
const MARGIN_PX = 80;

TAP_ZONE.addEventListener('pointerdown', handleTap);
// Also handle the full screen
document.getElementById('run-screen').addEventListener('pointerdown', e => {
  if (!runState || !runState.running) return;
  const y = e.clientY;
  const h = window.innerHeight;
  if (y < MARGIN_PX || y > h - MARGIN_PX) return;
  handleTap(e);
});

let tapTimeout = null;
let tapCount = 0;

function handleTap(e) {
  if (!runState || !runState.running) return;
  e.stopPropagation();
  tapCount++;
  if (tapCount === 1) {
    tapTimeout = setTimeout(() => { tapCount = 0; }, DOUBLE_TAP_MS);
  } else if (tapCount >= 2) {
    clearTimeout(tapTimeout);
    tapCount = 0;
    markSplit();
  }
}

// ===== STOP / SKIP =====
document.getElementById('btn-stop-run').addEventListener('click', () => {
  showModal('Abandonar run', '¿Quieres abandonar esta run? No se guardará el tiempo.', () => {
    if (runState) {
      cancelAnimationFrame(runState.rafId);
      runState = null;
    }
    releaseWakeLock();
    showScreen('home-screen');
    renderHome();
  });
});

document.getElementById('btn-skip-split').addEventListener('click', () => {
  if (!runState || !runState.running) return;
  if (runState.splitIdx === 0) return; // nothing to undo

  // Undo last split
  const undoneIdx = runState.splitIdx - 1;
  runState.splitTimes.pop();
  runState.splitIdx = undoneIdx;

  // Reset visual of undone split
  const undoneEntry = document.getElementById(`split-entry-${undoneIdx}`);
  if (undoneEntry) {
    undoneEntry.classList.remove('done-ahead', 'done-behind', 'done-gold');
    undoneEntry.style.opacity = '';
    undoneEntry.classList.add('current');
    document.getElementById(`split-actual-${undoneIdx}`).textContent = '—';
    document.getElementById(`split-delta-${undoneIdx}`).textContent = '';
    undoneEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Remove current highlight from the next one (if any)
  const prevCurrent = document.getElementById(`split-entry-${undoneIdx + 1}`);
  if (prevCurrent) prevCurrent.classList.remove('current');

  vibrate(60);
});

// ===== RESULTS ACTIONS =====
document.getElementById('btn-save-result').addEventListener('click', () => {
  commitSaveRun();
  // Disable save button to prevent double-save
  const btn = document.getElementById('btn-save-result');
  btn.textContent = '✓ GUARDADO';
  btn.disabled = true;
  btn.style.opacity = '0.6';
  // Update home button text
  document.getElementById('btn-results-home').textContent = '← VOLVER AL INICIO';
});

document.getElementById('btn-retry').addEventListener('click', () => {
  document.getElementById('btn-save-result').style.display = '';
  startRun(activeRun);
});

document.getElementById('btn-results-home').addEventListener('click', () => {
  releaseWakeLock();
  showScreen('home-screen');
  renderHome();
});

// ===== MODAL =====
let modalCallback = null;

function showModal(title, text, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;
  modalCallback = cb;
  document.getElementById('confirm-modal').classList.add('active');
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('active');
  modalCallback = null;
});

document.getElementById('modal-confirm').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('active');
  if (modalCallback) modalCallback();
  modalCallback = null;
});

// ===== INIT =====
loadState();
renderHome();

</script>
